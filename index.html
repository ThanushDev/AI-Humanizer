<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Humanizer | Digi Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <div class="max-w-6xl mx-auto px-4 py-12">
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold text-blue-700 mb-4 tracking-tight">
                ✨ AI Text Humanizer
            </h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto">
                Convert your ChatGPT or AI-generated content into natural, human-like writing in seconds. 
            </p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="flex flex-col space-y-2">
                <div class="flex justify-between items-center px-2">
                    <span class="font-bold text-slate-700">AI Generated Text</span>
                    <span id="charCount" class="text-xs text-slate-400 font-medium uppercase tracking-wider">0 Characters</span>
                </div>
                <textarea id="inputText" 
                    class="w-full h-80 md:h-[450px] p-6 rounded-3xl border border-slate-200 shadow-sm focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all resize-none text-slate-700 text-lg leading-relaxed" 
                    placeholder="Paste your AI content here..."></textarea>
            </div>

            <div class="flex flex-col space-y-2">
                <div class="flex justify-between items-center px-2">
                    <span class="font-bold text-slate-700">Humanized Output</span>
                    <button onclick="copyOutput()" class="text-blue-600 text-sm font-bold hover:underline">Copy All</button>
                </div>
                <div class="relative flex-grow">
                    <textarea id="outputText" readonly
                        class="w-full h-80 md:h-[450px] p-6 rounded-3xl border border-slate-200 bg-white shadow-sm outline-none resize-none text-slate-700 text-lg leading-relaxed" 
                        placeholder="Your natural text will appear here..."></textarea>
                </div>
            </div>
        </div>

        <div class="mt-12 text-center">
            <button onclick="processHumanize()" id="mainBtn" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-14 py-5 rounded-full text-xl font-black shadow-2xl transform hover:scale-105 active:scale-95 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                Humanize Content
            </button>
            <p id="loadingStatus" class="mt-4 text-sm text-blue-500 font-medium hidden animate-pulse">
                Analyzing patterns and rewriting... Please wait.
            </p>
        </div>

        <footer class="mt-20 border-t border-slate-200 pt-8 text-center text-slate-400 text-sm">
            <p>© 2026 Digi Solutions. Powered by Llama 3 & Cloudflare.</p>
        </footer>
    </div>

    <script>
        const inputEl = document.getElementById('inputText');
        const outputEl = document.getElementById('outputText');
        const btnEl = document.getElementById('mainBtn');
        const statusEl = document.getElementById('loadingStatus');
        const charCountEl = document.getElementById('charCount');

        // Character counter
        inputEl.addEventListener('input', () => {
            charCountEl.innerText = `${inputEl.value.length} Characters`;
        });

        async function processHumanize() {
            const textValue = inputEl.value.trim();

            if (!textValue || textValue.length < 10) {
                alert("Please paste some text first (minimum 10 characters).");
                return;
            }

            // Start Loading State
            btnEl.disabled = true;
            btnEl.innerText = "Processing...";
            statusEl.classList.remove('hidden');
            outputEl.value = "";

            try {
                // Cloudflare Worker API URL
                const apiUrl = 'https://ai-humanize.thanushnethsika555.workers.dev';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textValue })
                });

                if (!response.ok) throw new Error('Server error');

                const data = await response.json();
                
                if (data.result) {
                    outputEl.value = data.result;
                } else {
                    alert("The API returned an empty result. Check your Groq key.");
                }

            } catch (err) {
                console.error(err);
                alert("Error: Backend is not responding. Ensure your Cloudflare Worker is deployed and the URL is correct.");
            } finally {
                // End Loading State
                btnEl.disabled = false;
                btnEl.innerText = "Humanize Content";
                statusEl.classList.add('hidden');
            }
        }

        async function copyOutput() {
            if (!outputEl.value) return;
            try {
                await navigator.clipboard.writeText(outputEl.value);
                alert("Copied to clipboard!");
            } catch (err) {
                outputEl.select();
                document.execCommand('copy');
            }
        }
    </script>
</body>
</html>
